<?xml version="1.0" encoding="UTF-8"?>
<!--
  Gridea Pro — macOS DMG installer background (vector source)

  viewBox 600x400, matches create-dmg window-size in release.yml.
  Icons (configured in release.yml):
    App          at (150, 200)
    Applications at (450, 200)
  Icon size 110, so .app spans ~95..205 and Applications spans ~395..505.
  The middle band 220..380 is left for the drag-direction arrow.

  This SVG is the design source. The script rasterizes it to 1x + 2x PNGs
  and combines into a hidpi background.tiff for create-dmg.
  Open this file directly in a browser for a pixel-perfect preview.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <!-- 顶部柔和光晕，增加层次感 -->
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C7D2FE" stop-opacity="0"/>
    </radialGradient>
    <!-- 箭头头部 marker -->
    <marker id="arrow-head" viewBox="0 0 12 12" refX="6" refY="6"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6366F1"/>
    </marker>
  </defs>

  <!-- 渐变背景 -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#glow)"/>

  <!-- 标题 -->
  <text x="300" y="78"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="700" fill="#1E293B"
        text-anchor="middle" letter-spacing="-0.5">
    Gridea Pro
  </text>

  <!-- 副标题 -->
  <text x="300" y="112"
        font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="400" fill="#64748B"
        text-anchor="middle">
    Drag the app into your Applications folder
  </text>

  <!-- 拖拽提示箭头：从 App 图标右侧指向 Applications 图标左侧 -->
  <line x1="220" y1="200" x2="372" y2="200"
        stroke="#6366F1" stroke-width="4" stroke-linecap="round"
        marker-end="url(#arrow-head)"/>

  <!-- 底部品牌 -->
  <text x="300" y="375"
        font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="500" fill="#94A3B8"
        text-anchor="middle" letter-spacing="0.5">
    gridea.pro
  </text>
</svg>
